<!DOCTYPE html>
<html>
    <head>
        <base href="" >
        <meta charset="utf-8"/>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
        <meta name="description" content="MCGA FH 検証用"/>
        <title>Marketing Cloud Next Form Handler</title>
        <style>
            .honeypot { display:none; }
            /* エラーメッセージ用のスタイル */
            .error-message { color: red; font-size: 0.9em; display: none; }
        </style>
    </head>
    <body>
        Hello World<br>
        Marketing Cloud Next Form Handler.<br><br>

        <form id="MCJNSEAYVITBAWLOISA5YQOZTE7M" data-uma-forms="true">
            <label>メールアドレス</label><br>
            <input type="email" id="email" name="email" value="" placeholder="xxxx@example.com" required><br>
            <span id="email-error" class="error-message">正しいメールアドレスの形式で入力してください。</span><br>

            <label>Last Name</label><br>
            <input type="text" name="lastname" value="" maxlength="255" placeholder="〜8文字で入力"><br>
            
            <label>First Name</label><br>
            <input type="text" name="firstname" value="" maxlength="255" placeholder="〜8文字で入力"><br>
            
            <input type="hidden" name="status" value="New">
            <input type="hidden" id="lastmodifieddate" name="lastmodifieddate" value="">

            <div class="honeypot">
                <label for="comments">Comments</label>
                <input type="text" id="comments" name="comments">
            </div>
            
            <button type="submit">送信する</button>
        </form>

        <script>
            // ページ読み込み時に実行
            document.addEventListener("DOMContentLoaded", function() {
                // --- 既存の lastmodifieddate 設定処理 ---
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const milliseconds = String(now.getMilliseconds()).padStart(3, '0');
                
                const tzOffset = now.getTimezoneOffset();
                const offsetSign = tzOffset > 0 ? '-' : '+';
                const absOffset = Math.abs(tzOffset);
                const offsetHours = String(Math.floor(absOffset / 60)).padStart(2, '0');
                const offsetMinutes = String(absOffset % 60).padStart(2, '0');
                const timezoneString = `${offsetSign}${offsetHours}${offsetMinutes}`;
                
                const formattedDateTime = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${milliseconds}${timezoneString}`;
                document.getElementById("lastmodifieddate").value = formattedDateTime;

                
                // --- 変更点3: メールアドレスのバリデーション処理 ---
                const form = document.getElementById("MCJNSEAYVITBAWLOISA5YQOZTE7M");
                const emailInput = document.getElementById("email");
                const emailError = document.getElementById("email-error");

                // 変更前: form.addEventListener("submit", function(event) { ... });
                // 変更後: 以下のコードで上書きしてください
                
                form.addEventListener("submit", function(event) {
                    // 一般的なメールアドレスの形式をチェックする正規表現
                    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                    // 未入力、または形式が不正な場合
                    if (!emailInput.value || !emailPattern.test(emailInput.value)) {
                        // ① ブラウザの標準送信をストップ
                        event.preventDefault();
                        
                        // ② 【重要】Salesforce の外部スクリプトが動くのを強制ストップ！
                        event.stopImmediatePropagation(); 
                        
                        // エラーメッセージを表示する
                        emailError.style.display = "block";
                        emailInput.focus();
                    } else {
                        // 形式が正しい場合はエラーメッセージを隠す（Salesforceの送信処理へ進む）
                        emailError.style.display = "none";
                    }
                }, true); // ③ 【重要】末尾に `true` を追加し「キャプチャフェーズ（最優先）」で実行させる
                    }
                });
            });
        </script>

        <script async src="https://storm-d0e0d837e4de2f.my.site.com/lp/assets/scripts/external-form-handler-host.min.js" onload="SFDCFormHandler.init('https://storm-d0e0d837e4de2f.my.site.com/lp')"></script>
    </body>
</html>
