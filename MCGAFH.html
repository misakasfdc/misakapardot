　　</form>

<script>
    // ページ読み込み時に実行
    document.addEventListener("DOMContentLoaded", function() {
        // 現在の日時を取得
        const now = new Date();
        
        // 年・月・日を取得（2桁ゼロ埋め）
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        // 時・分・秒・ミリ秒を取得（2桁または3桁ゼロ埋め）
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const milliseconds = String(now.getMilliseconds()).padStart(3, '0');
        
        // タイムゾーンのオフセットを計算して文字列化 (例: 日本時間なら +0900)
        const tzOffset = now.getTimezoneOffset(); // 単位は分、UTCより進んでいる場合はマイナス値になる
        const offsetSign = tzOffset > 0 ? '-' : '+';
        const absOffset = Math.abs(tzOffset);
        const offsetHours = String(Math.floor(absOffset / 60)).padStart(2, '0');
        const offsetMinutes = String(absOffset % 60).padStart(2, '0');
        const timezoneString = `${offsetSign}${offsetHours}${offsetMinutes}`;
        
        // YYYY-MM-DDTHH:mm:ss.sss+HHmm の形式を作成
        const formattedDateTime = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${milliseconds}${timezoneString}`;
        
        // id="lastmodifieddate" の項目の value に指定されたフォーマットの日時をセット
        document.getElementById("lastmodifieddate").value = formattedDateTime;
    });
</script>
